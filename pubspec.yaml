name: super_auto_suggestion_box
description: >
  Super Auto Suggestion Box is a GeniusLink Flutter package providing a
  typeahead/combobox with local and remote sources, fuzzy matching, single or
  multi-select, free-text entry, progressive fallback, infinite scroll, recent
  suggestions, inline creation, record binding, read-only mode, advanced
  search, bare embedding, and shared core theming. Supports light/dark themes,
  LTR, and RTL.

version: 0.7.0

homepage: https://geniussystems24.github.io/super_auto_suggestion_box
repository: https://github.com/GeniusSystems24/super_auto_suggestion_box
issue_tracker: https://github.com/GeniusSystems24/super_auto_suggestion_box/issues

topics:
  - flutter
  - widgets
  - autocomplete
  - typeahead
  - combobox

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink design-system foundation (theme, tokens, type, widgets).
  super_core: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
    - assets/logo-mark-white.png
