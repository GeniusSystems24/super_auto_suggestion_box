name: super_auto_suggestion_box
description: >
  Super Auto Suggestion Box — a GeniusLink design-system Flutter package
  shipping the AutoSuggestionsBox typeahead / combobox (local + remote sources,
  prefix/contains/fuzzy matching, single- and multi-select, free-text entry, a
  local-first progressive remoteFallback source, an advanced-search overlay, and
  a bare embedding mode), plus the shared GeniusLink core theme foundation.
  Light/dark + LTR/RTL.

version: 0.5.0
homepage: https://geniussystems24.github.io/super_auto_suggestion_box
repository: https://github.com/GeniusSystems24/super_auto_suggestion_box
issue_tracker: https://github.com/GeniusSystems24/super_auto_suggestion_box/issues

topics:
  - flutter
  - widgets
  - autocomplete
  - typeahead
  - combobox

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink design-system foundation (theme, tokens, type, widgets).
  super_core: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
    - assets/logo-mark-white.png
  # Drop brand .ttf files under assets/fonts/ to match the design system exactly.
  # Families: Manrope (display) · Inter (body) · JetBrainsMono (mono) · NotoNaskhArabic
